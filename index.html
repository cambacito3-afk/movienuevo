<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peru in a Backpack — Travelling Near the Sky</title>

  <style>
    :root {
      --bg-1: #0f2027;
      --bg-2: #203a43;
      --bg-3: #2c5364;
      --accent: #f0a500;
      --soft: #f7efe5;
      --text: #e9f2f5;
      --muted: rgba(233, 242, 245, 0.7);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER / NAV ── */
    header {
      position: sticky;
      top: 0;
      backdrop-filter: blur(10px);
      background: rgba(15, 32, 39, 0.8);
      border-bottom: 1px solid rgba(240, 165, 0, 0.2);
      z-index: 10;
    }

    nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      gap: 18px;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }

    nav .brand {
      font-family: 'Playfair Display', serif;
      letter-spacing: 0.5px;
      font-size: 1.6rem;
      color: var(--soft);
    }

    nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      padding: 8px 10px;
      border-radius: 10px;
      transition: color 0.2s ease, background 0.2s ease, transform 0.2s ease;
    }

    nav a:hover {
      color: var(--soft);
      background: rgba(240, 165, 0, 0.12);
      transform: translateY(-1px);
    }

    /* ── HERO ── */
    .hero.mural {
      position: relative;
      overflow: hidden;
      min-height: 100vh;
      width: 100%;
      display: grid;
      align-items: end;
      color: var(--soft);
    }

    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
      opacity: 0.75;
    }

    .bg-video::-webkit-media-controls-start-playback-button {
      transform: translateY(40%);
    }

    .hero.mural > div {
      position: relative;
      z-index: 2;
      padding: 60px 24px;
    }

    .hero h1 {
      margin: 0 0 10px;
      font-family: 'Georgia', 'Times New Roman', serif;
      font-size: clamp(2.4rem, 6vw, 3.2rem);
      color: var(--soft);
      line-height: 1.1;
      text-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }

    .hero p {
      max-width: 620px;
      margin: 0 0 18px;
      font-size: 1.05rem;
      color: var(--muted);
    }

    .cta-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* ── BUTTONS ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1px solid rgba(240, 165, 0, 0.45);
      text-decoration: none;
      color: var(--soft);
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      border-color: rgba(240, 165, 0, 0.7);
    }

    /* ── MAIN CONTENT ── */
    main { flex: 1; }

    section {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px 20px;
    }

    section h2 {
      margin: 0 0 12px;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: var(--soft);
      letter-spacing: 0.4px;
    }

    section p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    /* ── CARDS ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 16px;
